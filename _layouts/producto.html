---
layout: default
---

<section class="section">
  <div class="container product-detail-grid">
    <div class="product-detail-media">
      <img src="{{ page.imagen }}" alt="{{ page.nombre }}" class="product-detail-image" />
    </div>

    <div class="product-detail-info">
      <p class="eyebrow">{{ site.data.categories[page.categoria] | default: page.categoria }}</p>
      <h1>{{ page.nombre | default: page.title }}</h1>
      <p class="product-price">{{ page.precioTexto | default: page.precio }}</p>
      {% if page.precioVariante %}
      <p class="product-variant">{{ page.precioVariante }}</p>
      {% endif %}
      <p class="product-description">{{ page.descripcion | default: content }}</p>

      <button
        class="jh-add-btn"
        data-slug="{{ page.slug | default: page.basename }}"
        data-nombre="{{ page.nombre | default: page.title }}"
        data-precio="{{ page.precio }}"
        data-preciotexto="{{ page.precioTexto | default: page.precio }}"
        data-imagen="{{ page.imagen }}"
      >
        + Añadir al carrito
      </button>

      <div class="card-nota-wrap">
        <button
          class="nota-toggle"
          type="button"
          aria-expanded="false"
          data-label-open="✎ Personalizar"
          data-label-close="✕ Cerrar personalización"
        >
          ✎ Personalizar
        </button>
        <textarea class="nota-input" placeholder="Color, texto, nombre, tamaño..." rows="3" hidden></textarea>
      </div>
    </div>
  </div>
</section>
