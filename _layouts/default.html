<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ page.description | default: page.descripcion | default: site.description }}" />
    <title>{{ page.title | default: page.nombre | default: site.title }} | {{ site.title }}</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="/" class="logo" aria-label="Jhugo3D — inicio">
          <span class="logo-j">J</span><span class="logo-rest">hugo</span><span class="logo-3d">3D</span>
        </a>

        <nav class="main-nav" aria-label="Navegación principal">
          <a href="/" class="nav-link{% if page.url == "/" %} active{% endif %}">Inicio</a>
          <a href="/catalogo/" class="nav-link{% if page.url == "/catalogo/" %} active{% endif %}">Catálogo</a>
          <a href="/personalizado/" class="nav-link{% if page.url == "/personalizado/" %} active{% endif %}">Personalizado</a>
          <a href="/proceso/" class="nav-link{% if page.url == "/proceso/" %} active{% endif %}">Proceso</a>
          <a href="/sobre/" class="nav-link{% if page.url == "/sobre/" %} active{% endif %}">Sobre</a>
          <a href="/contacto/" class="nav-link{% if page.url == "/contacto/" %} active{% endif %}">Contacto</a>
        </nav>

        <div class="header-actions">
          <button class="menu-toggle" aria-expanded="false" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <a href="/catalogo/" class="btn btn-primary header-cta">Catálogo</a>
        </div>
      </div>

      <div class="mobile-menu" id="mobile-menu" hidden>
        <nav class="mobile-nav" aria-label="Menú móvil">
          <a href="/">Inicio</a>
          <a href="/catalogo/">Catálogo</a>
          <a href="/personalizado/">Personalizado</a>
          <a href="/proceso/">Proceso</a>
          <a href="/sobre/">Sobre</a>
          <a href="/contacto/">Contacto</a>
        </nav>
      </div>
    </header>

    <main class="site-main">{{ content }}</main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <p class="footer-brand">Jhugo3D</p>
          <p class="footer-text">Impresión 3D personalizada desde Reus.</p>
        </div>
        <div class="footer-links">
          <a href="/contacto/">Contacto</a>
          <a href="/catalogo/">Catálogo</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; {{ site.time | date: '%Y' }} Jhugo3D. Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="/assets/scripts.js" defer></script>
    <script src="/cart/cart.js" defer></script>
    <script src="/chat/chat-widget.js" defer></script>
    <script src="/cursor/cursor.js" defer></script>
  </body>
</html>
