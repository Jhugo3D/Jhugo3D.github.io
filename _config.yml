title: Jhugo3D
description: "Impresiones 3D personalizadas de todo lo que imagines desde Reus."
url: "https://jhugo3d.github.io"
baseurl: ""
markdown: kramdown
collections:
  productos:
    output: true
    permalink: /productos/:name/
exclude:
  - jhugo3d
  - node_modules
  - package-lock.json
  - package.json
  - tsconfig.json
  - astro.config.mjs
  - AUDIT.md
  - debug-sites.mjs
  - download-assets.mjs
  - fetch-images.mjs
  - generate-products.mjs
  - scrape-names.mjs
  - public/
  - src/
  - .github/
